# EUREKA
eureka:
 instance:
  hostname: localhost
  
 client:
  # Discovery service should not register itself
  registerWithEureka: false
  # Make no sense for itself
  fetch-registry: false
  serviceUrl:
   defaultZone: http://${eureka.instance.hostname}/${server.port}/eureka/

# SERVER  
server:
 port: 8761